name: CloudTask CI

on:
  push:
    branches:
      - main

  pull_request:
    branches:
      - main

jobs:

  frontend:

    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: apps/frontend

    steps:

      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Dependencies
        run: npm install

      - name: Build React App
        run: npm run build


  backend:

    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: apps/backend

    steps:

      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Dependencies
        run: npm install

      - name: Verify Backend
        run: node --check src/server.js


  docker:

    runs-on: ubuntu-latest

    needs:
      - frontend
      - backend

    steps:

      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Build Backend Image
        run: |
          docker build \
          -t cloudtask-backend \
          ./apps/backend

      - name: Build Frontend Image
        run: |
          docker build \
          -t cloudtask-frontend \
          ./apps/frontend